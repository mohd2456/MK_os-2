# ===================================================================================
# MK OS - Extlinux Boot Configuration
# ===================================================================================
# This file is generated by build_image.sh and placed at /boot/extlinux.conf
# inside the disk image. It tells the syslinux/extlinux bootloader how to
# boot the Alpine Linux kernel with the MK OS root filesystem.
#
# KEY SETTINGS FOR UTM SE:
#   - console=ttyS0,115200   → Required for "Console Only" display mode
#   - console=tty0           → Also output to virtual VGA (if display is used)
#   - root=/dev/vda1         → VirtIO block device (UTM SE default)
#   - modules=virtio_blk,virtio_net,ext4  → Load VirtIO drivers in initramfs
#
# If your VM uses IDE instead of VirtIO, change root=/dev/vda1 to root=/dev/sda1
# ===================================================================================

DEFAULT mk_os
PROMPT 0
TIMEOUT 30

LABEL mk_os
    MENU LABEL MK OS - Hybrid AI System
    LINUX /boot/vmlinuz-virt
    INITRD /boot/initramfs-virt
    APPEND root=/dev/vda1 rootfstype=ext4 console=ttyS0,115200 console=tty0 modules=virtio_blk,virtio_net,ext4 quiet

LABEL mk_os_debug
    MENU LABEL MK OS - Debug Mode (verbose boot)
    LINUX /boot/vmlinuz-virt
    INITRD /boot/initramfs-virt
    APPEND root=/dev/vda1 rootfstype=ext4 console=ttyS0,115200 console=tty0 modules=virtio_blk,virtio_net,ext4 loglevel=7
