# ===================================================================================
# MK HYBRID OPERATING SYSTEM - GRUB BOOT CONFIGURATION (`grub.cfg`)
# Target Baseline: 2010 MacBook Pro (BIOS/EFI Legacy Layer)
# Scope: Hardened Kernel Initialization & Low-Precision Model Passing
# ===================================================================================

set default=0
set timeout=3

# Configure VBE Graphical Terminal Framebuffer for Structured Observation (Spec #12)
set gfxmode=1024x768x32
set gfxpayload=keep

insmod ext2
insmod part_gpt

menuentry "MK-OS AI Core (Deterministic Hybrid Mode)" {
    echo "=========================================================="
    echo "       Initializing MK-OS Secure TCB Initialization Vector  "
    echo "=========================================================="
    
    echo "Loading signed microkernel payload..."
    # Boot the microkernel while explicitly declaring the cache constraints and mapping targets
    linux /kernel/mk_kernel.img quiet splash MK_ARENA_ALLOC_MB=300 MK_PRECISION=INT4 loglevel=3
    
    echo "Loading operational memory ramdisk image..."
    # Loads the root primitives, micro-components, and the core ai_core execution daemon
    initrd /kernel/initrd.img
    
    echo "Verification complete. Handing off processing tokens to CPU0..."
}

menuentry "MK-OS (Experimental Safe Mode - Neural Replacement FSM Active)" {
    echo "Loading minimal kernel environment..."
    # Spec #48: On critical failure or massive thermal spikes, swap neural networks for FSMs
    linux /kernel/mk_kernel.img quiet splash MK_BYPASS_NEURAL=1 MK_FORCE_FSM=1 loglevel=5
    initrd /kernel/initrd.img
}